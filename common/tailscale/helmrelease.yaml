apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  releaseName: tailscale-operator
  interval: 1h
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: tailscale-operator
      version: 1.90.6
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  dependsOn:
  - name: istiod
    namespace: istio-system
  values:
    apiServerProxyConfig:
      allowImpersonation: true
      mode: "true"
