apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cni
spec:
  releaseName: cni
  interval: 1h
  chart:
    spec:
      chart: cni
      version: 1.27.3
      sourceRef:
        kind: HelmRepository
        name: istio
  dependsOn:
  - name: istiod
  values:
    profile: ambient
    global:
      platform: k3d
