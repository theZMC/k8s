apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
spec:
  releaseName: istiod
  interval: 1h
  chart:
    spec:
      chart: istiod
      version: 1.27.3
      sourceRef:
        kind: HelmRepository
        name: istio
  dependsOn:
  - name: base
  values:
    profile: ambient
    cni:
      enabled: true
    global:
      meshID: lab
    meshConfig:
      enableTracing: true
      defaultProviders:
        metrics:
        - opentelemetry
        accessLogging:
        - opentelemetry
        tracing:
        - opentelemetry
      extensionProviders:
      - name: opentelemetry
        opentelemetry:
          service: k8s-monitoring-alloy-receiver.lgtm
          port: 4317
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: istiod
