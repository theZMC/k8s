# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  path: ./base/applications/loki
  prune: true
  wait: true
  patches:
  - patch: |-
      spec:
        values:
          gateway:
            ingress:
              enabled: true
              ingressClassName: tailscale
              hosts:
              - host: loki
                paths:
                - path: /
                  pathType: Prefix
              tls:
              - hosts:
                - loki
    target:
      kind: HelmRelease
      name: loki
  - patch: |
      - op: replace
        path: /spec/dependsOn
        value:
        - kind: HelmRelease
          name: tailscale-operator
        - kind: HelmRelease
          name: istiod
    target:
      kind: HelmRelease
      name: loki
