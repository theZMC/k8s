apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: lgtm
spec:
  driftDetection:
    mode: enabled
  releaseName: k8s-monitoring
  interval: 1h
  chart:
    spec:
      chart: k8s-monitoring
      version: 3.5.6
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: lgtm
  dependsOn:
  - name: istiod
    namespace: istio-system
  - name: tailscale-operator
    namespace: tailscale
  - name: loki
    namespace: lgtm
  values:
    cluster:
      name: lab
    destinations:
    - name: mimir
      type: prometheus
      url: http://mimir-gateway/api/v1/push
    - name: loki
      type: loki
      url: http://loki-gateway/loki/api/v1/push
    - name: tempo
      type: otlp
      url: http://tempo-gateway/otlp/v1/traces
    annotationAutodiscovery:
      enabled: true
      annotations:
        scrape: prometheus.io/scrape
        metricsPath: prometheus.io/path
        metricsPortNumber: prometheus.io/port
    clusterMetrics:
      enabled: true
    clusterEvents:
      enabled: true
    podLogs:
      enabled: true
    applicationObservability:
      enabled: true
      receivers:
        otlp:
          http:
            enabled: true
          grpc:
            enabled: true
    prometheusOperatorObjects:
      enabled: true
    alloy-metrics:
      enabled: true
    alloy-logs:
      enabled: true
    alloy-singleton:
      enabled: true
    alloy-receiver:
      enabled: true
      alloy:
        extraPorts:
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: lgtm
spec:
  driftDetection:
    mode: enabled
  releaseName: tempo
  interval: 1h
  chart:
    spec:
      chart: tempo-distributed
      version: 1.52.4
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: lgtm
  dependsOn:
  - name: istiod
    namespace: istio-system
  - name: tailscale-operator
    namespace: tailscale
  values:
    ingester:
      replicas: 2
    tempo:
      structuredConfig:
        memberlist:
          cluster_label: tempo
      memberlist:
        appProtocol: grpc
    gateway:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: tailscale
        hosts:
        - host: tempo
          paths:
          - path: /
            pathType: Prefix
        tls:
        - hosts:
          - tempo
    minio:
      enabled: true
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: lgtm
spec:
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: lgtm
spec:
  driftDetection:
    mode: enabled
  releaseName: prometheus-operator-crds
  interval: 1h
  chart:
    spec:
      chart: prometheus-operator-crds
      version: 24.0.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: lgtm
